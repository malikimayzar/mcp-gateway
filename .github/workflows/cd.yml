name: CD — Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:   # Manual trigger dari GitHub UI

jobs:
  deploy:
    name: Deploy mcp-gateway
    runs-on: ubuntu-latest
    environment: production  # Butuh approval kalau di-setup di GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service mcp-gateway --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify deployment health
        run: |
          echo "Waiting for deploy to propagate..."
          sleep 30
          curl -f ${{ secrets.RAILWAY_PUBLIC_URL }}/health || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deploy berhasil: ${{ github.sha }}"
          echo "URL: ${{ secrets.RAILWAY_PUBLIC_URL }}"