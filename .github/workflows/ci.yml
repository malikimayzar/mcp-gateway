name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  GOLANGCI_LINT_VERSION: "v1.57.2"

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ─────────────────────────────────────────
  # Job 2: Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp_secret
          POSTGRES_DB: mcp_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run unit tests
        run: |
          go test -v -race -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...
        env:
          DATABASE_URL: postgres://mcp:mcp_secret@localhost:5432/mcp_gateway?sslmode=disable
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENVIRONMENT: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # ─────────────────────────────────────────
  # Job 3: Docker Build Check
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mcp-gateway:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image built
        run: docker images mcp-gateway

  # ─────────────────────────────────────────
  # Job 4: Docker Compose Smoke Test
  # ─────────────────────────────────────────
  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env <<EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          POSTGRES_USER=mcp
          POSTGRES_PASSWORD=mcp_secret
          POSTGRES_DB=mcp_gateway
          ENVIRONMENT=ci
          EOF

      - name: Start core services
        run: |
          docker compose up -d postgres mcp-gateway
          echo "Waiting for services to be healthy..."
          sleep 15

      - name: Health check — MCP Gateway
        run: |
          curl -f --retry 5 --retry-delay 3 \
            http://localhost:8080/health || \
            (docker compose logs mcp-gateway && exit 1)

      - name: Health check — PostgreSQL
        run: |
          docker compose exec -T postgres \
            pg_isready -U mcp -d mcp_gateway

      - name: Cleanup
        if: always()
        run: docker compose down -v